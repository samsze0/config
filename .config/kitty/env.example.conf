# Device-specific Configuration
# Copy this file to env.conf and customize for your environment

# =============================================================================
# Environment Variables
# =============================================================================
env XDG_CONFIG_HOME=$HOME/.config
env XDG_DATA_HOME=$HOME/.local/share

# =============================================================================
# Shell
# =============================================================================
shell /opt/homebrew/bin/nu

# =============================================================================
# Startup Session
# =============================================================================
startup_session $HOME/.local/share/kitty/sessions/last-session
