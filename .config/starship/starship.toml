"$schema" = 'https://starship.rs/config-schema.json'

format = "$directory$git_branch$git_commit$git_state$git_metrics$git_status$all$line_break$character"

[battery]
disabled = true

[memory_usage]
disabled = true

[username]
disabled = false
style_root = "bright-black"
style_user = "bright-black"
show_always = false
format = "‚ãÖ [$user]($style) "

[hostname]
disabled = false
ssh_only = true
style = "bright-yellow"
format = "‚ãÖ [$hostname]($style) "

[localip]
disabled = false
ssh_only = true
style = "bright-yellow"
format = "‚ãÖ [$localipv4]($style) "

[character]
disabled = false
success_symbol = "[‚ùØ](bold blue)"
error_symbol = "[‚ùØ](bold red)"
vimcmd_symbol = "[‚ùÆ](bold blue)"
vimcmd_visual_symbol = "[‚ùÆ](bold yellow)"
vimcmd_replace_symbol = "[‚ùÆ](bold red)"
vimcmd_replace_one_symbol = "[‚ùÆ](bold red)"
format = "[$symbol]($style) "

[jobs]
disabled = false
threshold = 1
symbol_threshold = 1
number_threshold = 1
symbol = "‚ú¶"
style = "blue"
format = "‚ãÖ [$symbol$number]($style) "

[aws]
disabled = true

[azure]
disabled = true

[cmd_duration]
disabled = false
min_time = 0
style = "bright-black"
show_milliseconds = false
show_notifications = false
min_time_to_notify = 45000
format = "‚ãÖ [$duration]($style) "

[nix_shell]
disabled = false
symbol = "Nix"
style = "blue"
impure_msg = "impure"
pure_msg = "pure"

[package]
disabled = true

[docker_context]
disabled = false
symbol = "Û∞°® "
style = "blue"
only_with_files = true
format = "‚ãÖ [$symbol$context]($style) "

[container]
disabled = true

[directory]
disabled = false
style = "bright-black"

[git_status]
disabled = false
style = " bright-black"
ahead = "‚á°"
behind = "‚á£"
stashed = ""
up_to_date = ""
diverged = " è"
conflicted = "C"
deleted = "D"
renamed = "R"
modified = "!"
staged = "+"
untracked = "?"
ignore_submodules = true
format = "‚ãÖ [$all_status$ahead_behind]($style) "

[git_state]
disabled = false
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
style = " bright-black"
format = "‚ãÖ [$state ($progress_current/$progress_total)]($style) "

[git_branch]
disabled = false
symbol = "ÓÇÝ "
style = " blue"
format = "‚ãÖ [$symbol$branch(:$remote_branch)]($style) "

[git_metrics]
disabled = true
added_style = "blue"
deleted_style = "red"
only_nonzero_diffs = true
format = "[+$added]($added_style) [-$deleted]($deleted_style)"

[kubernetes]
disabled = false
symbol = "Û±Éæ "
style = "blue"
format = "‚ãÖ [$symbol$context$namespace]($style) "

[shell]
disabled = false
bash_indicator = "bash"
zsh_indicator = "zsh"
nu_indicator = "nu"
fish_indicator = "Û∞à∫"
powershell_indicator = "ÔëÝ_"
unknown_indicator = "?"
style = "bright-black"
format = "‚ãÖ [$indicator]($style) "

