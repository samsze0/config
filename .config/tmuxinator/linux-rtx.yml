name: linux-rtx
root: ~/dev/image-gen

windows:
  - graphos-codex:
      panes:
        - nix develop -c nu -c codex
        - nix develop -c nu -c codex
  - graphos-server:
      panes:
        - nix develop -c nu -c "uv run cli.py server"
  - comfyui:
      root: ~/dev/ComfyUI
      panes:
        - nix develop -c nu -c "uv run main.py --listen 0.0.0.0 --enable-manager"
