# =============================================================================
# tmux Configuration File
# =============================================================================
# Personal tmux configuration with custom keybindings and dark theme styling

# -----------------------------------------------------------------------------
# Core Settings
# -----------------------------------------------------------------------------

# Use vi-style key bindings in copy mode and command prompt
set -g mode-keys vi

# Eliminate delay when pressing escape key (important for vim/nvim users)
# Default is 500ms which can interfere with editor responsiveness
set -g escape-time 0

# Enable mouse support for pane selection, resizing, and scrolling
# Allows clicking to select panes and scrolling with mouse wheel
set -g mouse on

# -----------------------------------------------------------------------------
# Prefix Key Configuration
# -----------------------------------------------------------------------------

# Set prefix key to Alt+' (Meta + single quote)
# This replaces the default Ctrl+b with a more accessible combination
set -g prefix M-"'"

# -----------------------------------------------------------------------------
# Configuration Management
# -----------------------------------------------------------------------------

# Reload tmux configuration file with 'prefix + r'
# Sources the config and displays confirmation message
bind r source-file ~/.config/tmux/tmux.conf \; display-message " Config reloaded"

# -----------------------------------------------------------------------------
# Pane Navigation & Management
# -----------------------------------------------------------------------------

# Pane navigation using vim-like directional keys
# These bindings use 'esdf' instead of 'hjkl' for ergonomic reasons
bind e select-pane -U    # Up
bind d select-pane -D    # Down
bind s select-pane -L    # Left
bind f select-pane -R    # Right

# Create new panes with intuitive directional keys
# New panes inherit the current working directory
bind Right split-window -h -c "#{pane_current_path}"  # Horizontal split (side-by-side)
bind Down split-window -v -c "#{pane_current_path}"   # Vertical split (top-bottom)

# Pane management shortcuts
bind z resize-pane -Z    # Toggle pane zoom (fullscreen)
bind x kill-pane         # Close current pane

# -----------------------------------------------------------------------------
# Window Navigation & Management
# -----------------------------------------------------------------------------

# Window navigation using j/l keys
bind j select-window -p  # Previous window
bind l select-window -n  # Next window

# Window management
bind w kill-window       # Close current window (removed confirmation prompt)
bind t new-window -n ''  # Create new window with empty name

# Rename current window with comma key
# Shows current window name as default input
bind ',' command-prompt -p " " -I "#W" "rename-window '%1'"

# -----------------------------------------------------------------------------
# Copy Mode Configuration (Currently Disabled)
# -----------------------------------------------------------------------------
# These bindings would enable vim-like copy mode behavior
# Uncomment to use:
# bind -n M-';' copy-mode                               # Enter copy mode with Alt+;
# bind -T copy-mode-vi v send-keys -X begin-selection   # Start selection with 'v'
# bind -T copy-mode-vi y send-keys -X copy-selection    # Copy selection with 'y'
# bind -T copy-mode-vi q send-keys -X cancel            # Exit copy mode with 'q'

# -----------------------------------------------------------------------------
# Window Indexing & Display
# -----------------------------------------------------------------------------

# Start window numbering at 1 instead of 0 (more intuitive)
set -g base-index 1

# Window status formatting
# Inactive windows: blue text showing index:name
setw -g window-status-format "#[fg=#547d9c]#I:#W"

# Active window: bright blue with conditional styling
# Shows prefix indicator and zoom status with pane count
setw -g window-status-current-format "#[fg=#4C9BFF]#I:#{?client_prefix,#[fg=#4C9BFF],#[fg=#CBD1DA]}#W#{?window_zoomed_flag,#[fg=#4C9BFF]-#P/#{window_panes},}"

# Update status bar every 5 seconds
setw -g status-interval 5

# Automatically renumber windows when one is closed
# Prevents gaps in window numbering
set -g renumber-windows on

# -----------------------------------------------------------------------------
# Status Bar Configuration
# -----------------------------------------------------------------------------

# Use emacs-style key bindings in status line (command prompt)
set -g status-keys emacs

# Status bar content and sizing
set -g status-right "#S "        # Show session name on the right
set -g status-right-length 40    # Maximum length for right status
set -g status-left " "            # Minimal left status (just spacing)
set -g status-left-length 0      # No reserved space for left status

# -----------------------------------------------------------------------------
# Color Scheme & Styling
# -----------------------------------------------------------------------------

# Pane background colors (dark theme)
set -g window-style 'bg=#0f1118'        # Inactive pane background
set -g window-active-style 'bg=#0f1118' # Active pane background (same for consistency)

# Terminal compatibility - enables 256 color support
set -g default-terminal "screen-256color"

# Status bar styling - dark background with light text
set -g status-style "bg=#0f1118 fg=#CBD1DA bold"

# Copy mode search highlighting (currently disabled)
# setw -g copy-mode-current-match-style "bg=#35373A fg=#CBD1DA"
# setw -g copy-mode-match-style "bg=#35373A fg=#CBD1DA"

# Pane border colors
set -g pane-border-style "fg=#1E2D39"        # Inactive pane borders (subtle)
set -g pane-active-border-style "fg=#959BA3" # Active pane border (more visible)

# Command prompt and message styling
set -g message-style "fg=#CBD1DA bg=#0f1118 bold"
